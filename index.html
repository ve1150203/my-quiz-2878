<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工程品管測驗系統 - 標靶抽題版</title>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --text: #1e293b; }
        body { font-family: "Microsoft JhengHei", sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        
        /* 設定區樣式 */
        .setup-section { text-align: center; margin-bottom: 30px; padding: 25px; background: #ffffff; border: 2px solid #e2e8f0; border-radius: 12px; }
        .form-group { margin-bottom: 20px; text-align: left; max-width: 500px; margin-left: auto; margin-right: auto; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #475569; }
        select { width: 100%; padding: 12px; font-size: 16px; border-radius: 8px; border: 2px solid #cbd5e1; background: #fff; cursor: pointer; }
        
        /* 測驗區樣式 */
        .quiz-card { display: none; }
        .question-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #f1f5f9; padding-bottom: 10px; margin-bottom: 20px; }
        .unit-tag { background: #dbeafe; color: #1e40af; padding: 4px 12px; border-radius: 20px; font-size: 13px; font-weight: bold; }
        .q-text { font-size: 20px; font-weight: bold; margin-bottom: 20px; color: #0f172a; min-height: 60px; }
        
        /* 選項 */
        .options-grid { display: grid; gap: 12px; }
        .opt-btn { padding: 15px 20px; border: 2px solid #e2e8f0; border-radius: 10px; background: white; text-align: left; cursor: pointer; font-size: 16px; transition: 0.2s; }
        .opt-btn:hover:not(:disabled) { border-color: var(--primary); background: #f0f7ff; }
        .opt-btn.correct { background: #dcfce7; border-color: #22c55e; color: #166534; font-weight: bold; }
        .opt-btn.wrong { background: #fee2e2; border-color: #ef4444; color: #991b1b; }

        /* 解析與按鈕 */
        #noteBox { margin-top: 20px; padding: 15px; background: #fff7ed; border-left: 5px solid #f97316; border-radius: 8px; display: none; font-size: 15px; color: #9a3412; }
        .btn { padding: 15px 25px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; font-size: 16px; width: 100%; margin-top: 15px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-next { background: #334155; color: white; display: none; }
        
        #backToTop { position: fixed; bottom: 30px; right: 30px; padding: 12px 18px; background: #64748b; color: white; border: none; border-radius: 50%; display: none; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

<div class="container">
    <div id="setup" class="setup-section">
        <h2 style="color:var(--primary)">🛠️ 工程品管標靶測驗</h2>
        
        <div class="form-group">
            <label>1. 選擇單元範圍</label>
            <select id="unitSelect">
                <option value="all">全部單元 (1-2878 題)</option>
            </select>
        </div>

        <div class="form-group">
            <label>2. 選擇隨機抽題數</label>
            <select id="countSelect">
                <option value="30">隨機抽 30 題</option>
                <option value="50">隨機抽 50 題</option>
                <option value="100">隨機抽 100 題</option>
                <option value="all">該範圍全部題目</option>
            </select>
        </div>

        <button class="btn btn-primary" onclick="startQuiz()">開始標靶測驗</button>
    </div>

    <div id="quiz" class="quiz-card">
        <div class="question-header">
            <span id="progress" style="font-weight:bold; color:#64748b;">載入中...</span>
            <span id="unitTag" class="unit-tag">單元標籤</span>
        </div>
        <div id="qidDisplay" style="font-size:12px; color:#94a3b8; margin-bottom:10px;">ID: --</div>
        <div id="questionText" class="q-text">題目載入中...</div>
        
        <div id="options" class="options-grid"></div>

        <div id="noteBox"></div>
        <button id="nextBtn" class="btn btn-next" onclick="nextQuestion()">下一題</button>
    </div>
</div>

<button id="backToTop" onclick="window.scrollTo({top:0, behavior:'smooth'})">↑</button>

<script src="quiz_data.js"></script>

<script>
    let quizPool = [];
    let currentIndex = 0;

    // 初始化：自動抓取單元名稱
    window.onload = () => {
        const unitSelect = document.getElementById('unitSelect');
        const units = [...new Set(allQuestions.map(q => q.unit))].filter(Boolean);
        units.forEach(u => {
            const opt = document.createElement('option');
            opt.value = u;
            opt.textContent = u;
            unitSelect.appendChild(opt);
        });
        
        window.onscroll = () => {
            document.getElementById('backToTop').style.display = window.scrollY > 300 ? "block" : "none";
        };
    };

    function startQuiz() {
        const unit = document.getElementById('unitSelect').value;
        const count = document.getElementById('countSelect').value;
        
        // Step 1: 過濾單元
        let tempPool = (unit === "all") ? [...allQuestions] : allQuestions.filter(q => q.unit === unit);
        
        // Step 2: 隨機打散
        tempPool.sort(() => Math.random() - 0.5);
        
        // Step 3: 擷取題數
        if (count !== "all") {
            quizPool = tempPool.slice(0, parseInt(count));
        } else {
            quizPool = tempPool;
        }

        if (quizPool.length === 0) return alert("該單元目前沒有題目！");

        currentIndex = 0;
        document.getElementById('setup').style.display = 'none';
        document.getElementById('quiz').style.display = 'block';
        showQuestion();
    }

    function showQuestion() {
        const q = quizPool[currentIndex];
        const optsDiv = document.getElementById('options');
        const noteBox = document.getElementById('noteBox');
        const nextBtn = document.getElementById('nextBtn');
        
        optsDiv.innerHTML = '';
        noteBox.style.display = 'none';
        nextBtn.style.display = 'none';
        
        document.getElementById('progress').textContent = `進度：${currentIndex + 1} / ${quizPool.length}`;
        document.getElementById('unitTag').textContent = q.unit;
        document.getElementById('qidDisplay').textContent = `題號 ID: ${q.id}`;
        document.getElementById('questionText').textContent = q.q;

        ['A', 'B', 'C', 'D'].forEach(label => {
            const btn = document.createElement('button');
            btn.className = 'opt-btn';
            btn.textContent = `${label}. ${q[label]}`;
            btn.onclick = () => checkAnswer(label, btn);
            optsDiv.appendChild(btn);
        });
    }

    function checkAnswer(userPick, btn) {
        const q = quizPool[currentIndex];
        const allBtns = document.querySelectorAll('.opt-btn');
        allBtns.forEach(b => b.disabled = true);

        if (userPick === q.ans) {
            btn.classList.add('correct');
        } else {
            btn.classList.add('wrong');
            const correctIdx = ['A', 'B', 'C', 'D'].indexOf(q.ans);
            allBtns[correctIdx].classList.add('correct');
        }

        // 只有在有解析內容時才顯示 noteBox
        if (q.note && q.note.trim() !== "") {
            noteBox.innerHTML = `<b>💡 關鍵解析：</b><br>${q.note}`;
            noteBox.style.display = 'block';
        }

        document.getElementById('nextBtn').style.display = 'block';
    }

    function nextQuestion() {
        currentIndex++;
        if (currentIndex < quizPool.length) {
            showQuestion();
            window.scrollTo(0,0);
        } else {
            alert(`測驗結束！您已完成 ${quizPool.length} 題練習。`);
            location.reload();
        }
    }
</script>

</body>
</html>
