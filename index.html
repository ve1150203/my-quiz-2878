<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工程題庫模擬測驗</title>
    <style>
        :root { --primary: #2563eb; --correct-bg: #dcfce7; --wrong-bg: #fee2e2; }
        body { font-family: "Microsoft JhengHei", sans-serif; background: #f1f5f9; padding: 15px; line-height: 1.6; margin: 0; }
        .container { max-width: 800px; margin: 20px auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); position: relative; }
        h1 { text-align: center; color: var(--primary); margin-top: 0; }
        
        /* 選單與得分區 */
        .mode-section { margin: 15px 0; padding: 15px; background: #e0f2fe; border: 1px solid #7dd3fc; border-radius: 8px; text-align: center; }
        .mode-btn { background: #0ea5e9; color: white; padding: 10px 18px; border: none; border-radius: 5px; cursor: pointer; margin: 5px; font-size: 15px; font-weight: bold; }
        
        /* 歷史紀錄區 */
        .review-section { margin: 10px 0; padding: 15px; background: #fffbeb; border: 1px solid #fcd34d; border-radius: 8px; text-align: center; }
        .review-btn { background: #f59e0b; color: white; padding: 8px 12px; border: none; border-radius: 5px; cursor: pointer; margin: 5px; }

        /* 得分區樣式 (在頂部顯示) */
        #summary { display: none; margin: 15px 0; padding: 20px; border-radius: 8px; text-align: center; background: #f0fdf4; border: 2px solid #22c55e; }
        .score-text { font-size: 24px; color: #166534; font-weight: bold; margin-bottom: 10px; }

        /* 題目樣式 */
        .question { margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px dashed #cbd5e1; }
        .q-text { font-weight: bold; font-size: 17px; margin-bottom: 12px; color: #1e293b; display: block; }
        .q-id-note { color: #2563eb; font-weight: bold; font-size: 0.9em; margin-left: 5px; background: #eff6ff; padding: 2px 6px; border-radius: 4px; border: 1px solid #bfdbfe; }

        .option { display: block; padding: 12px; border: 1px solid #e2e8f0; border-radius: 6px; cursor: pointer; margin-bottom: 8px; background: #fff; }
        input[type="radio"] { margin-right: 10px; transform: scale(1.2); }
        .correct { background: var(--correct-bg) !important; border-color: #86efac !important; }
        .wrong { background: var(--wrong-bg) !important; border-color: #fca5a5 !important; }
        
        .btn { display: block; width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; margin-top: 20px; font-weight: bold; }
        
        /* 回到頂端按鈕 - 修正強制顯示版 */
        #backToTop {
            position: fixed;
            bottom: 30px;
            right: 20px;
            width: 60px;
            height: 60px;
            background-color: #2563eb;
            color: #ffffff;
            border: 2px solid #ffffff;
            border-radius: 50%;
            font-size: 35px;
            cursor: pointer;
            z-index: 999999;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            display: none; /* 由 JS 控制 */
            justify-content: center;
            align-items: center;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🏗️ 工程模擬測驗</h1>
    
    <div class="mode-section">
        <div style="margin-bottom: 10px; font-weight: bold;">請選擇隨機測驗題數：</div>
        <button onclick="startNewQuiz(30)" class="mode-btn">30 題</button>
        <button onclick="startNewQuiz(50)" class="mode-btn">50 題</button>
        <button onclick="startNewQuiz(100)" class="mode-btn">100 題</button>
    </div>

    <div id="summary"></div>

    <div class="review-section" id="history-section" style="display:none;">
        <div style="margin-bottom: 10px; font-weight: bold;">錯題複習 (最近 3 次)：</div>
        <div id="history-btns"></div>
    </div>

    <div id="quiz-container"></div>

    <button id="submit-btn" class="btn" onclick="submitQuiz()" style="display:none;">提交所有答案並查看結果</button>
</div>

<div id="backToTop" onclick="scrollToTop()">↑</div>

<script src="quiz_data.js"></script>

<script>
    let currentQuestions = [];
    let lastCount = 30;

    // 回到頂端按鈕控制邏輯
    const topBtn = document.getElementById("backToTop");
    window.addEventListener('scroll', function() {
        let y = window.pageYOffset || document.documentElement.scrollTop;
        if (y > 400) {
            topBtn.style.display = "flex";
        } else {
            topBtn.style.display = "none";
        }
    });

    function scrollToTop() {
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // 初始化載入
    window.onload = () => {
        renderHistory();
        if (typeof allQuestions !== 'undefined') {
            startNewQuiz(30); 
        }
    };

    function startNewQuiz(count) {
        lastCount = count;
        let shuffled = [...allQuestions].sort(() => 0.5 - Math.random());
        currentQuestions = shuffled.slice(0, count);
        
        // 重置介面
        document.getElementById('summary').style.display = 'none';
        document.getElementById('quiz-container').innerHTML = '';
        document.getElementById('submit-btn').style.display = 'block';
        
        renderQuiz();
        scrollToTop();
    }

    function renderQuiz() {
        const container = document.getElementById('quiz-container');
        container.innerHTML = currentQuestions.map((q, index) => `
            <div class="question">
                <div class="q-text">
                    ${index + 1}. ${q.q} 
                    <span class="q-id-note">（題庫第 ${q.id} 題）</span>
                </div>
                ${q.o.map((opt, i) => {
                    const val = ["A", "B", "C", "D"][i];
                    return `
                        <label class="option" id="opt-${index}-${val}">
                            <input type="radio" name="q${index}" value="${val}">
                            ${opt}
                        </label>
                    `;
                }).join('')}
                <div id="ans-${index}" style="display:none; color:#dc2626; font-weight:bold; margin-top:10px;">
                    正確答案：${q.a}
                </div>
            </div>
        `).join('');
    }

    function submitQuiz() {
        let score = 0;
        let wrongIds = [];

        currentQuestions.forEach((q, index) => {
            const selected = document.querySelector(`input[name="q${index}"]:checked`);
            const ansDiv = document.getElementById(`ans-${index}`);
            
            if (selected) {
                if (selected.value === q.a) {
                    score++;
                    document.getElementById(`opt-${index}-${selected.value}`).classList.add('correct');
                } else {
                    wrongIds.push(q.id);
                    document.getElementById(`opt-${index}-${selected.value}`).classList.add('wrong');
                    document.getElementById(`opt-${index}-${q.a}`).classList.add('correct');
                    ansDiv.style.display = 'block';
                }
            } else {
                wrongIds.push(q.id);
                document.getElementById(`opt-${index}-${q.a}`).classList.add('correct');
                ansDiv.style.display = 'block';
            }
        });

        // 錯題歷史紀錄
        if (wrongIds.length > 0) {
            saveHistory(wrongIds);
            renderHistory();
        }

        // 頂部顯示得分與重新考按鈕
        const sumBox = document.getElementById('summary');
        sumBox.style.display = 'block';
        sumBox.innerHTML = `
            <div class="score-text">測驗完成！得分：${score} / ${currentQuestions.length}</div>
            <button onclick="startNewQuiz(${lastCount})" class="mode-btn" style="background:#64748b; font-size: 16px;">
                重新挑戰 ${lastCount} 題 (隨機)
            </button>
        `;
        
        document.getElementById('submit-btn').style.display = 'none';
        
        // 送出後自動回到最上方看分數
        scrollToTop();
    }

    function startReview(ids) {
        currentQuestions = allQuestions.filter(q => ids.includes(q.id));
        document.getElementById('summary').style.display = 'none';
        document.getElementById('quiz-container').innerHTML = '';
        document.getElementById('submit-btn').style.display = 'block';
        renderQuiz();
        scrollToTop();
    }

    function saveHistory(ids) {
        let history = JSON.parse(localStorage.getItem('quiz_history') || '[]');
        history.unshift(ids);
        if (history.length > 3) history.pop();
        localStorage.setItem('quiz_history', JSON.stringify(history));
    }

    function renderHistory() {
        const history = JSON.parse(localStorage.getItem('quiz_history') || '[]');
        const section = document.getElementById('history-section');
        const container = document.getElementById('history-btns');
        if (history.length === 0) return;
        section.style.display = 'block';
        container.innerHTML = history.map((ids, index) => 
            `<button class="review-btn" onclick='startReview(${JSON.stringify(ids)})'>
                第 ${index + 1} 次錯題 (${ids.length}題)
            </button>`
        ).join('');
    }
</script>
</body>
</html>
