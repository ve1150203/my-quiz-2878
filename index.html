<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工程題庫模擬測驗</title>
    <style>
        :root { --primary: #2563eb; --correct-bg: #dcfce7; --wrong-bg: #fee2e2; }
        body { font-family: "Microsoft JhengHei", sans-serif; background: #f1f5f9; padding: 15px; line-height: 1.6; }
        .container { max-width: 800px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: var(--primary); }
        
        /* 題數選擇區 */
        .mode-section { margin: 15px 0; padding: 15px; background: #e0f2fe; border: 1px solid #7dd3fc; border-radius: 8px; text-align: center; }
        .mode-btn { background: #0ea5e9; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; margin: 5px; font-size: 16px; font-weight: bold; }
        .mode-btn:hover { background: #0284c7; }

        .review-section { margin: 10px 0 20px 0; padding: 15px; background: #fffbeb; border: 1px solid #fcd34d; border-radius: 8px; text-align: center; }
        .review-btn { background: #f59e0b; color: white; padding: 8px 12px; border: none; border-radius: 5px; cursor: pointer; margin: 5px; }

        .question { margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px dashed #cbd5e1; }
        .q-text { font-weight: bold; font-size: 17px; margin-bottom: 12px; color: #1e293b; }
        
        /* 強制顯示題號的樣式 */
        .q-id-note { color: #2563eb; font-weight: bold; margin-left: 5px; }

        .option { display: block; padding: 12px; border: 1px solid #e2e8f0; border-radius: 6px; cursor: pointer; margin-bottom: 8px; background: #fff; }
        input[type="radio"] { margin-right: 10px; transform: scale(1.2); }
        
        .correct { background: var(--correct-bg) !important; border-color: #86efac !important; }
        .wrong { background: var(--wrong-bg) !important; border-color: #fca5a5 !important; }
        
        .btn { display: block; width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; margin-top: 20px; font-weight: bold; }
        #summary { display: none; margin-top: 20px; padding: 20px; border-radius: 8px; text-align: center; font-size: 20px; background: #f8fafc; border: 2px solid #e2e8f0; }
    </style>
</head>
<body>

<div class="container">
    <h1>🏗️ 工程模擬測驗</h1>
    
    <div class="mode-section">
        <div style="margin-bottom: 10px; font-weight: bold;">請選擇隨機測驗題數：</div>
        <button onclick="startNewQuiz(30)" class="mode-btn">30 題</button>
        <button onclick="startNewQuiz(50)" class="mode-btn">50 題</button>
        <button onclick="startNewQuiz(100)" class="mode-btn">100 題</button>
    </div>

    <div class="review-section" id="history-section" style="display:none;">
        <div style="margin-bottom: 10px; font-weight: bold;">錯題複習 (最近 3 次)：</div>
        <div id="history-btns"></div>
    </div>

    <div id="quiz-container">
        </div>

    <button id="submit-btn" class="btn" onclick="submitQuiz()" style="display:none;">提交所有答案</button>
    
    <div id="summary"></div>
</div>

<script src="quiz_data.js"></script>

<script>
    let currentQuestions = [];
    let lastCount = 30;

    // 網頁開啟後立刻執行的動作
    window.onload = () => {
        renderHistory();
        // 預設先自動開啟 30 題，確保電腦版進來不是空的
        if (typeof allQuestions !== 'undefined') {
            startNewQuiz(30);
        } else {
            document.getElementById('quiz-container').innerHTML = '<p style="color:red; text-align:center;">找不到題庫檔案 (quiz_data.js)，請檢查檔案是否存在。</p>';
        }
    };

    function startNewQuiz(count) {
        lastCount = count;
        // 打亂題庫
        let shuffled = [...allQuestions].sort(() => 0.5 - Math.random());
        // 擷取題數
        currentQuestions = shuffled.slice(0, count);
        
        // 重置介面
        document.getElementById('summary').style.display = 'none';
        document.getElementById('quiz-container').innerHTML = '';
        document.getElementById('submit-btn').style.display = 'block';
        
        renderQuiz();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function renderQuiz() {
        const container = document.getElementById('quiz-container');
        let html = '';
        
        currentQuestions.forEach((q, index) => {
            html += `
                <div class="question" id="q-box-${index}">
                    <div class="q-text">
                        ${index + 1}. ${q.q} 
                        <span class="q-id-note">（題庫第 ${q.id} 題）</span>
                    </div>
                    ${q.o.map((opt, i) => {
                        const val = ["A", "B", "C", "D"][i];
                        return `
                            <label class="option" id="opt-${index}-${val}">
                                <input type="radio" name="q${index}" value="${val}">
                                ${opt}
                            </label>
                        `;
                    }).join('')}
                    <div id="ans-${index}" style="display:none; color:#dc2626; font-weight:bold; margin-top:10px; border-top:1px solid #fee2e2; padding-top:5px;">
                        正確答案是：${q.a}
                    </div>
                </div>
            `;
        });
        
        container.innerHTML = html;
    }

    function submitQuiz() {
        let score = 0;
        let wrongIds = [];

        currentQuestions.forEach((q, index) => {
            const selected = document.querySelector(`input[name="q${index}"]:checked`);
            const ansDiv = document.getElementById(`ans-${index}`);
            
            if (selected) {
                if (selected.value === q.a) {
                    score++;
                    document.getElementById(`opt-${index}-${selected.value}`).classList.add('correct');
                } else {
                    wrongIds.push(q.id);
                    document.getElementById(`opt-${index}-${selected.value}`).classList.add('wrong');
                    document.getElementById(`opt-${index}-${q.a}`).classList.add('correct');
                    ansDiv.style.display = 'block';
                }
            } else {
                // 沒選也算錯
                wrongIds.push(q.id);
                document.getElementById(`opt-${index}-${q.a}`).classList.add('correct');
                ansDiv.style.display = 'block';
            }
        });

        // 紀錄錯題
        if (wrongIds.length > 0) {
            saveHistory(wrongIds);
            renderHistory();
        }

        const sumBox = document.getElementById('summary');
        sumBox.style.display = 'block';
        sumBox.innerHTML = `
            <div style="font-size:24px; color:var(--primary); margin-bottom:15px;">測驗完成！</div>
            您的得分：<span style="font-size:30px; color:#ef4444;">${score}</span> / ${currentQuestions.length}
            <button onclick="startNewQuiz(${lastCount})" class="btn" style="background:#64748b; width:auto; padding:10px 30px; margin: 20px auto 0 auto;">
                再挑戰一次 ${lastCount} 題
            </button>
        `;
        
        document.getElementById('submit-btn').style.display = 'none';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function startReview(ids) {
        currentQuestions = allQuestions.filter(q => ids.includes(q.id));
        document.getElementById('summary').style.display = 'none';
        document.getElementById('quiz-container').innerHTML = '';
        document.getElementById('submit-btn').style.display = 'block';
        renderQuiz();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function saveHistory(ids) {
        let history = JSON.parse(localStorage.getItem('quiz_history') || '[]');
        history.unshift(ids);
        if (history.length > 3) history.pop();
        localStorage.setItem('quiz_history', JSON.stringify(history));
    }

    function renderHistory() {
        const history = JSON.parse(localStorage.getItem('quiz_history') || '[]');
        const section = document.getElementById('history-section');
        const container = document.getElementById('history-btns');
        if (history.length === 0) return;
        section.style.display = 'block';
        container.innerHTML = history.map((ids, index) => 
            `<button class="review-btn" onclick='startReview(${JSON.stringify(ids)})'>
                第 ${index + 1} 次錯題 (${ids.length}題)
            </button>`
        ).join('');
    }
</script>

</body>
</html>
