<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工程品管測驗系統</title>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --text: #1e293b; }
        body { font-family: "Microsoft JhengHei", sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .setup-section { text-align: center; padding: 25px; border: 2px solid #e2e8f0; border-radius: 12px; }
        .form-group { margin-bottom: 20px; text-align: left; max-width: 600px; margin-left: auto; margin-right: auto; }
        label { display: block; font-weight: bold; margin-bottom: 8px; }
        select { width: 100%; padding: 12px; font-size: 16px; border-radius: 8px; border: 2px solid #cbd5e1; }
        .quiz-card { display: none; }
        .question-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #f1f5f9; padding-bottom: 10px; margin-bottom: 20px; }
        .unit-tag { background: #dbeafe; color: #1e40af; padding: 4px 12px; border-radius: 20px; font-size: 13px; font-weight: bold; }
        .q-text { font-size: 20px; font-weight: bold; margin-bottom: 20px; line-height: 1.6; }
        .options-grid { display: grid; gap: 12px; }
        .opt-btn { padding: 15px 20px; border: 2px solid #e2e8f0; border-radius: 10px; background: white; text-align: left; cursor: pointer; font-size: 16px; width: 100%; }
        .opt-btn.correct { background: #dcfce7 !important; border-color: #22c55e !important; color: #166534; font-weight: bold; }
        .opt-btn.wrong { background: #fee2e2 !important; border-color: #ef4444 !important; color: #991b1b; }
        #noteBox { margin-top: 20px; padding: 15px; background: #fff7ed; border-left: 5px solid #f97316; border-radius: 8px; display: none; color: #9a3412; }
        .btn { padding: 16px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; font-size: 18px; width: 100%; margin-top: 10px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-review { background: #f59e0b; color: white; margin-top: 10px; }
        .btn-next { background: #334155; color: white; display: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="setup" class="setup-section">
        <h2 style="color:var(--primary)">🎓 工程品管專業測驗 (17單元版)</h2>
        <div class="form-group">
            <label>1. 選擇單元範圍</label>
            <select id="unitSelect">
                <option value="all">【全部題目隨機抽】</option>
                <option value="1-222">1-222：單元二：第三章 品質分析方法與應用</option>
                <option value="223-402">223-402：單元二：第二章 統計分析方法與應用</option>
                <option value="403-598">403-598：單元二：第一章 監造計畫與品質計畫指導</option>
                <option value="599-649">599-649：永續公共工程</option>
                <option value="650-797">650-797：單元一：第三章 公共工程履約管理</option>
                <option value="798-1123">798-1123：單元一：第二章 公共工程管理相關法規概要</option>
                <option value="1124-1221">1124-1221：單元二：第六章 建築工程之界面整合</option>
                <option value="1222-1382">1222-1382：單元二：第五章 電梯設備工程品質管理</option>
                <option value="1383-1652">1383-1652：單元二：第四章 消防設備及空調設備工程品質管理實務</option>
                <option value="1653-1820">1653-1820：單元二：第三章 給排水衛生設備工程品質管理實務</option>
                <option value="1821-2052">1821-2052：單元二：第二章 弱電(含中央監控)設備工程品質管理實務</option>
                <option value="2053-2194">2053-2194：單元二：第一章 電氣設備工程品質管理實務</option>
                <option value="2195-2385">2195-2385：單元二：第六章 工程品質稽核</option>
                <option value="2386-2606">2386-2606：單元二：第五章 施工管制與檢驗</option>
                <option value="2607-2836">2607-2836：單元二：第四章 工程進料檢驗與管制</option>
                <option value="2837-2866">2837-2866：單元一：第一章 公共工程施工品質管理制度理念與導入</option>
                <option value="2867-2878">2867-2878：政府採購全生命週期概論</option>
            </select>
        </div>
        <div class="form-group">
            <label>2. 選擇抽題數量</label>
            <select id="countSelect">
                <option value="30">隨機抽 30 題</option>
                <option value="50">隨機抽 50 題</option>
                <option value="100">隨機抽 100 題</option>
                <option value="all">該範圍全部</option>
            </select>
        </div>
        <button class="btn btn-primary" onclick="startQuiz(false)">開始測驗</button>
        <button id="reviewBtn" class="btn btn-review" onclick="startQuiz(true)" style="display:none;">📖 錯題複習</button>
    </div>

    <div id="quiz" class="quiz-card">
        <div class="question-header">
            <span id="progress" style="font-weight:bold;">載入中...</span>
            <span id="unitTag" class="unit-tag">工程單元</span>
        </div>
        <div id="qidDisplay" style="font-size:12px; color:#94a3b8; margin-bottom:10px;">ID: --</div>
        <div id="questionText" class="q-text"></div>
        <div id="options" class="options-grid"></div>
        <div id="noteBox"></div>
        <button id="nextBtn" class="btn btn-next" onclick="nextQuestion()">下一題</button>
    </div>
</div>

<script src="quiz_data.js"></script>

<script>
    let quizPool = [];
    let currentIndex = 0;
    let wrongIds = JSON.parse(localStorage.getItem('myWrongList') || '[]');

    window.onload = () => {
        if (wrongIds.length > 0) document.getElementById('reviewBtn').style.display = 'block';
    };

    function startQuiz(isReview) {
        if (isReview) {
            quizPool = allQuestions.filter(q => wrongIds.includes(q.id));
        } else {
            const range = document.getElementById('unitSelect').value;
            const count = document.getElementById('countSelect').value;
            let tempPool = (range === "all") ? [...allQuestions] : allQuestions.filter(q => {
                let id = parseInt(q.id);
                let [s, e] = range.split('-').map(Number);
                return id >= s && id <= e;
            });
            tempPool.sort(() => Math.random() - 0.5);
            quizPool = (count === "all") ? tempPool : tempPool.slice(0, parseInt(count));
        }

        if (quizPool.length === 0) return alert("沒有題目！");
        currentIndex = 0;
        document.getElementById('setup').style.display = 'none';
        document.getElementById('quiz').style.display = 'block';
        showQuestion();
    }

    function showQuestion() {
        const q = quizPool[currentIndex];
        const optsDiv = document.getElementById('options');
        optsDiv.innerHTML = '';
        document.getElementById('noteBox').style.display = 'none';
        document.getElementById('nextBtn').style.display = 'none';
        
        document.getElementById('progress').textContent = `進度：${currentIndex + 1} / ${quizPool.length}`;
        document.getElementById('qidDisplay').textContent = `題目 ID: ${q.id}`;
        document.getElementById('questionText').textContent = q.q;
        document.getElementById('unitTag').textContent = getUnitName(q.id);

        const labels = ['A', 'B', 'C', 'D'];
        if (q.o && Array.isArray(q.o)) {
            q.o.forEach((text, index) => {
                const btn = document.createElement('button');
                btn.className = 'opt-btn';
                // --- 關鍵修正：不再手動加標籤，直接顯示 text (因為 text 裡面已經有 (A) 了) ---
                btn.textContent = text; 
                btn.onclick = () => checkAnswer(labels[index], btn);
                optsDiv.appendChild(btn);
            });
        }
    }

    function getUnitName(id) {
        const n = parseInt(id);
        if (n <= 222) return "品質分析手法與應用";
        if (n <= 402) return "統計分析手法與應用";
        if (n <= 598) return "監造與品質計畫指導";
        if (n <= 649) return "永續公共工程";
        if (n <= 797) return "公共工程履約管理";
        if (n <= 1123) return "管理相關法規概要";
        if (n <= 1221) return "建築工程界面整合";
        if (n <= 1382) return "電梯設備品質管理";
        if (n <= 1652) return "消防空調品質管理";
        if (n <= 1820) return "給排水衛生品質管理";
        if (n <= 2052) return "弱電監控品質管理";
        if (n <= 2194) return "電氣設備品質管理";
        if (n <= 2385) return "工程品質稽核";
        if (n <= 2606) return "施工管制與檢驗";
        if (n <= 2836) return "工程進料檢驗管制";
        if (n <= 2866) return "施工品質制度理念";
        return "採購全生命週期";
    }

    function checkAnswer(userPick, btn) {
        const q = quizPool[currentIndex];
        const allBtns = document.querySelectorAll('.opt-btn');
        const correctAns = q.a.toUpperCase(); 
        allBtns.forEach(b => b.disabled = true);

        if (userPick === correctAns) {
            btn.classList.add('correct');
            wrongIds = wrongIds.filter(id => id !== q.id);
        } else {
            btn.classList.add('wrong');
            const correctIdx = ['A', 'B', 'C', 'D'].indexOf(correctAns);
            if (correctIdx !== -1) allBtns[correctIdx].classList.add('correct');
            if (!wrongIds.includes(q.id)) wrongIds.push(q.id);
        }
        localStorage.setItem('myWrongList', JSON.stringify(wrongIds));

        if (q.note) {
            const noteBox = document.getElementById('noteBox');
            noteBox.innerHTML = `<b>💡 解析：</b><br>${q.note}`;
            noteBox.style.display = 'block';
        }
        document.getElementById('nextBtn').style.display = 'block';
    }

    function nextQuestion() {
        currentIndex++;
        if (currentIndex < quizPool.length) {
            showQuestion();
            window.scrollTo(0,0);
        } else {
            alert("測驗完成！");
            location.reload();
        }
    }
</script>
</body>
</html>
