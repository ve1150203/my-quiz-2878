<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工程題庫模擬測驗 - 專業版</title>
    <style>
        :root { --primary: #2563eb; --correct-bg: #dcfce7; --wrong-bg: #fee2e2; }
        body { font-family: "Microsoft JhengHei", sans-serif; background: #f1f5f9; padding: 15px; line-height: 1.6; }
        .container { max-width: 800px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: var(--primary); margin-bottom: 5px; }
        
        /* 題數選擇區 - 這次新增的選單 */
        .mode-section { margin: 15px 0; padding: 15px; background: #e0f2fe; border: 1px solid #7dd3fc; border-radius: 8px; text-align: center; }
        .mode-btn { background: #0ea5e9; color: white; padding: 8px 20px; border: none; border-radius: 5px; cursor: pointer; margin: 5px; font-size: 16px; transition: 0.3s; }
        .mode-btn:hover { background: #0284c7; }

        /* 錯題複習區 */
        .review-section { margin: 10px 0 20px 0; padding: 15px; background: #fffbeb; border: 1px solid #fcd34d; border-radius: 8px; text-align: center; }
        .review-btn { background: #f59e0b; color: white; padding: 8px 12px; border: none; border-radius: 5px; cursor: pointer; margin: 5px; transition: 0.3s; }

        .question { margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px dashed #cbd5e1; }
        .q-text { font-weight: bold; font-size: 17px; margin-bottom: 12px; }
        
        /* 這裡就是您要的『題庫 XX』樣式 */
        .q-id-tag { color: #2563eb; font-size: 0.9em; margin-left: 8px; font-weight: bold; background: #eff6ff; padding: 2px 6px; border-radius: 4px; } 

        .option { display: block; padding: 10px; border: 1px solid #e2e8f0; border-radius: 6px; cursor: pointer; margin-bottom: 8px; }
        input[type="radio"] { margin-right: 10px; transform: scale(1.2); }
        .correct { background: var(--correct-bg) !important; border-color: #86efac !important; }
        .wrong { background: var(--wrong-bg) !important; border-color: #fca5a5 !important; }
        
        .btn { display: block; width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; margin-top: 20px; }
        #summary { display: none; margin-top: 20px; padding: 20px; border-radius: 8px; font-weight: bold; text-align: center; font-size: 20px; background: #f8fafc; }
    </style>
</head>
<body>

<div class="container">
    <h1>🏗️ 工程模擬測驗</h1>
    
    <div class="mode-section">
        <p style="margin-top:0; font-weight:bold; color:#0369a1;">選擇隨機測驗題數：</p>
        <button onclick="startNewQuiz(30)" class="mode-btn">30 題</button>
        <button onclick="startNewQuiz(50)" class="mode-btn">50 題</button>
        <button onclick="startNewQuiz(100)" class="mode-btn">100 題</button>
    </div>

    <div class="review-section" id="history-section" style="display:none;">
        <p style="margin-top:0; font-weight:bold;">錯題複習 (最近 3 次)：</p>
        <div id="history-btns"></div>
    </div>

    <div id="quiz-container"></div>

    <button id="submit-btn" class="btn" onclick="submitQuiz()" style="display:none;">提交所有答案</button>
    <div id="summary"></div>
</div>

<script src="quiz_data.js"></script>

<script>
    let currentQuestions = [];
    let lastChosenCount = 30; // 預設記錄

    window.onload = () => { renderHistory(); };

    // 2. 優化：開始測驗函式，會根據傳入的數量隨機抽題
    function startNewQuiz(count = 100) {
        lastChosenCount = count;
        // 打亂題庫
        let shuffled = [...allQuestions].sort(() => 0.5 - Math.random());
        // 依照所選題數切出題目
        currentQuestions = shuffled.slice(0, count);
        
        document.getElementById('summary').style.display = 'none';
        document.getElementById('quiz-container').innerHTML = '';
        document.getElementById('submit-btn').style.display = 'block';
        
        renderQuiz();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // 3. 重點：渲染題目，並在題目最後加上『題庫 ID』
    function renderQuiz() {
        const container = document.getElementById('quiz-container');
        container.innerHTML = currentQuestions.map((q, index) => `
            <div class="question" id="q-box-${index}">
                <div class="q-text">
                    ${index + 1}. ${q.q} 
                    <span class="q-id-tag">『題庫 ${q.id}』</span>
                </div>
                ${q.o.map((opt, i) => {
                    const val = ["A", "B", "C", "D"][i];
                    return `
                        <label class="option" id="opt-${index}-${val}">
                            <input type="radio" name="q${index}" value="${val}">
                            ${opt}
                        </label>
                    `;
                }).join('')}
                <div id="ans-${index}" style="display:none; color:#dc2626; font-weight:bold; margin-top:10px;">
                    正確答案：${q.a}
                </div>
            </div>
        `).join('');
    }

    function submitQuiz() {
        let score = 0;
        let wrongIds = [];

        currentQuestions.forEach((q, index) => {
            const selected = document.querySelector(`input[name="q${index}"]:checked`);
            const ansDiv = document.getElementById(`ans-${index}`);
            
            if (selected) {
                if (selected.value === q.a) {
                    score++;
                    document.getElementById(`opt-${index}-${selected.value}`).classList.add('correct');
                } else {
                    wrongIds.push(q.id);
                    document.getElementById(`opt-${index}-${selected.value}`).classList.add('wrong');
                    document.getElementById(`opt-${index}-${q.a}`).classList.add('correct');
                    ansDiv.style.display = 'block';
                }
            } else {
                wrongIds.push(q.id);
                document.getElementById(`opt-${index}-${q.a}`).classList.add('correct');
                ansDiv.style.display = 'block';
            }
        });

        if (wrongIds.length > 0) {
            saveHistory(wrongIds);
            renderHistory();
        }

        const sumBox = document.getElementById('summary');
        sumBox.style.display = 'block';
        sumBox.innerHTML = `得分：${score} / ${currentQuestions.length} <br> 
            <button onclick="startNewQuiz(${lastChosenCount})" class="btn" style="background:#64748b; width:auto; padding:10px 20px; margin: 10px auto;">
                重新隨機考 ${lastChosenCount} 題
            </button>`;
        
        document.getElementById('submit-btn').style.display = 'none';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function startReview(ids) {
        currentQuestions = allQuestions.filter(q => ids.includes(q.id));
        document.getElementById('summary').style.display = 'none';
        document.getElementById('quiz-container').innerHTML = '';
        document.getElementById('submit-btn').style.display = 'block';
        renderQuiz();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function saveHistory(ids) {
        let history = JSON.parse(localStorage.getItem('
